<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBC Hostel - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="simple-page">
    <section class="card">
      <h2>Create Account</h2>
      <p class="muted">Register for Student, Warden, or Mess portal.</p>

```
  <label for="role">Role</label>
  <select id="role">
    <option value="student">Student</option>
    <option value="warden">Warden</option>
    <option value="mess">Mess</option>
  </select>

  <label for="name">Full Name</label>
  <input id="name" type="text" placeholder="Enter name">

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Enter email">

  <label for="admissionNumber">Admission Number (Student only)</label>
  <input id="admissionNumber" type="text" placeholder="e.g. MBCS122">

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Create password">

  <p id="message" class="message"></p>
  <button class="btn" id="registerBtn">Register</button>

  <div class="row-links center">
    <a href="index.html">Back to Login</a>
  </div>
</section>
```

  </main>

  <script src="js/api.js"></script>

  <script src="js/register.js"></script>

</body>
</html>
