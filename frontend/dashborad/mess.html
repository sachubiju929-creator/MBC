<!DOCTYPE html>
<html>
<head>
  <title>Mess Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="header">
  <h3>Mess Staff Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2 id="name"></h2>

  <div class="stats">
    <div class="stat-box">
      <h4>Total Students</h4>
      <p id="students"></p>
    </div>

    <div class="stat-box">
      <h4>Meals Today</h4>
      <p id="meals"></p>
    </div>

    <div class="stat-box">
      <h4>Mess Cuts</h4>
      <p id="cuts"></p>
    </div>
  </div>

</div>

<script src="../js/mess.js"></script>
</body>
</html>
