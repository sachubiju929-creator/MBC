<!DOCTYPE html>
<html>
<head>
  <title>Warden Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="header">
  <h3>Warden Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <h2 id="name"></h2>

  <div class="stats">
    <div class="stat-box">
      <h4>Total Students</h4>
      <p id="students"></p>
    </div>

    <div class="stat-box">
      <h4>Pending Leaves</h4>
      <p id="leaves"></p>
    </div>

    <div class="stat-box">
      <h4>Complaints</h4>
      <p id="complaints"></p>
    </div>
  </div>
</div>

<script src="../js/warden.js"></script>
</body>
</html>
