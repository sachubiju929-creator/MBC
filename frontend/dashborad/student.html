<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="header">
  <h3>Student Dashboard</h3>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <h2 id="name"></h2>

  <div class="stats">
    <div class="stat-box">
      <h4>Mess Cuts</h4>
      <p id="messCuts"></p>
    </div>

    <div class="stat-box">
      <h4>Leave Days</h4>
      <p id="leaveDays"></p>
    </div>

    <div class="stat-box">
      <h4>Complaints</h4>
      <p id="complaints"></p>
    </div>
  </div>

</div>

<script src="../js/student.js"></script>
</body>
</html>
